site_name: Agent Immergence
site_description: AI course progress and paper reading tracker
site_url: https://agent-immergence.github.io/
repo_url: https://github.com/Agent-Immergence/Agent-Immergence.github.io
repo_name: Agent-Immergence/Agent-Immergence.github.io

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - 课程进度: index.md
  - 论文阅读: papers.md
  - 编辑: admin/index.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/js/site.js?v=3

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
